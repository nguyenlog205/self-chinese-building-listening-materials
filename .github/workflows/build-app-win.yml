name: Build Windows installer (app_win)

on:
  push:
    branches: [main]
    paths:
      - "app_win/**"
      - ".github/workflows/build-app-win.yml"
  pull_request:
    paths:
      - "app_win/**"
      - ".github/workflows/build-app-win.yml"
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: app_win
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch ffmpeg
        shell: pwsh
        run: npm run fetch:ffmpeg

      - name: Build backend exe (PyInstaller)
        shell: pwsh
        run: npm run build:exe

      - name: Install Electron deps
        run: npm install --prefix electron

      - name: Build NSIS installer
        run: npm run build:win --prefix electron

      - uses: actions/upload-artifact@v4
        with:
          name: listening-practice-windows-installer
          path: app_win/dist/*.exe
          if-no-files-found: error
